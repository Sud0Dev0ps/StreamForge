services:

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    group_add:
      - ${DOCKER_GID}
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=${HOMEPAGE_ALLOWED_HOSTS}
    ports:
      - ${HOMEPAGE_PORT}:3000
    volumes:
      - ${HOMEPAGE_CONFIG_PATH}:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - media_network_prod

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${JELLYFIN_CONFIG_PATH}:/config
      - ${DATA_PATH}:/data
    ports:
      - ${JELLYFIN_PORT}:8096
    restart: unless-stopped
    networks:
      - media_network_prod 
  
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    user: 1000:1000
    ports:
      - ${NAVIDROME_PORT}:4533
    volumes:
      - ${NAVIDROME_CONFIG_PATH}:/data
      - ${NAVIDROME_MUSIC_PATH}:/music:ro
    restart: unless-stopped
    networks:
      - media_network_prod

  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: nzbget
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${NZBGET_CONFIG_PATH}:/config
      - ${DATA_PATH}:/data
    ports:
      - ${NZBGET_PORT}:6789
    restart: unless-stopped
    networks:
      - media_network_prod

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM}
    volumes:
      - ${PLEX_CONFIG_PATH}:/config
      - ${PLEX_CONFIG_PATH}/transcode:/transcode
      - ${DATA_PATH}:/data
    restart: unless-stopped

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    environment:
      - TZ=${TZ}
    ports:
      - ${SEERR_PORT}:5055
    volumes:
      - ${SEERR_CONFIG_PATH}:/app/config
    restart: unless-stopped
    networks:
      - media_network_prod

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${PROWLARR_CONFIG_PATH}:/config
    ports:
      - ${PROWLARR_PORT}:9696
    restart: unless-stopped
    networks:
      - media_network_prod
      
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${RADARR_CONFIG_PATH}:/config
      - ${DATA_PATH}:/data
    ports:
      - ${RADARR_PORT}:7878
    restart: unless-stopped
    networks:
      - media_network_prod

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${SONARR_CONFIG_PATH}:/config
      - ${DATA_PATH}:/data
    ports:
      - ${SONARR_PORT}:8989
    restart: unless-stopped
    networks:
      - media_network_prod

networks:
  media_network_prod:
    external: true