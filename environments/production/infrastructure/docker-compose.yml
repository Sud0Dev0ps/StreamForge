services:
  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    restart: unless-stopped
    ports:
      - 192.168.10.10:${DOCKHAND_PORT}:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKHAND_CONFIG_PATH}:/app/data
    networks:
      - infra_network_prod

networks:
  infra_network_prod:
    external: true